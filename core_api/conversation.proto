syntax = "proto3";

package core_api;

option go_package = "./core_api";

import "basic/pagination.proto";
import "google/protobuf/struct.proto";
import "basic/http.proto";


/* 用户端 */
// 对话相关

// 新建对话
message CreateConversationReq {}
message CreateConversationResp {
  string conversationId = 1;
  int32 code = 255;
  string msg = 256;
}

// 对话列表
message ListConversationsReq {
  basic.PaginationOptions paginationOptions = 1;
}
message ListConversationsResp {
  repeated ConversationVO conversationList = 1;
  basic.Pagination pagination = 2;
  int32 code = 255;
  string msg = 256;
}

// 获得对话下的历史消息
message GetConversationReq {
  basic.PaginationOptions paginationOptions = 1;
  string conversationId = 2;
}
message GetConversationResp {
  basic.Pagination pagination = 1;
  repeated Message messageList = 2;
  int32 code = 255;
  string msg = 256;
}


message ConversationVO {
  string conversationId = 1;
  string brief = 2;
  int64 createTime = 3;
  int64 updateTime = 4;
}

message Message {
  string content = 1;
  // 角色, system/assistant/user/tool, 依次为1,2,3,4
  int32 role = 2;
  // 消息索引
  int32 index = 3;
}

// SSEEvent
message SSEEvent {
  // 事件数据
  string eventData = 1;
  // 事件id
  int32 eventId = 2;
  // 事件类型
  int32 eventType = 3;
}