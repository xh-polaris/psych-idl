syntax = "proto3";

package core_api;

option go_package = "core_api";

import "basic/pagination.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/any.proto";
import "basic/http.proto";
import "core_api/user.proto";

message UnitVO {
  string id = 1;
  string phone = 2;
  string password = 3;
  string name = 4;
  string address = 5;
  string contact = 6;
  int32 level = 7;
  string status = 8;
  int64 createTime = 9;
  int64 updateTime = 10;
  int64 deleteTime = 11;
}

// 注册相关
message UnitSignUpReq {
  UnitVO unit = 1;
}
message UnitSignUpResp {
  UnitVO unit = 1;
  int32 code = 255;
  string msg = 256;
}

// 登录相关
message UnitSignInReq {
  int32 authType = 1;
  string authId = 2;
  string verifyCode = 3;
  string unitId = 4; // 后续改成unitName，用synapse的Query Unit获得unitId
}
message UnitSignInResp {
  string unitId = 1;
  string token = 2;
  int32 code = 255;
  string msg = 256;
}

// 获取信息
message UnitGetInfoReq {
  string unitId = 1[(http.query) = "unitId"];
}
message UnitGetInfoResp {
  UnitVO unit = 1;
  int32 code = 255;
  string msg = 256;
}

// 更新信息
message UnitUpdateInfoReq {
  UnitVO unit = 1;
}

// 更新密码
message UnitUpdatePasswordReq {
  string id = 1;
  int32 authType = 2;
  string verifyCode = 3;
  string newPassword = 4;
}

// 关联用户
message UnitLinkUserReq {
  string unitId = 1;
  string userId = 2;
}

// 创建并关联用户
message UnitCreateAndLinkUserReq {
  string unitId = 1;
  string codeType = 2;
  repeated core_api.UserVO users = 3;
}
message UnitCreateAndLinkUserResp {
  int32 allCount = 1;
  int32 successCount = 2;
  int32 skipCount = 3;
  int32 code = 255;
  string msg = 256;
}