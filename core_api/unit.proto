syntax = "proto3";

package core_api;

option go_package = "./core_api";

import "basic/pagination.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/any.proto";
import "basic/http.proto";
import "core_api/user.proto";

message UnitVO {
  string id = 1;
  string name = 4;
  string address = 5;
  string contact = 6;
  int32 level = 7;
  // 1-2: Active | Deleted
  int32 status = 8;
  int64 createTime = 9;
  int64 updateTime = 10;
  int64 deleteTime = 11;
}

// 获取信息
message UnitGetInfoReq {
  string unitId = 1[(http.query) = "unitId"];
}
message UnitGetInfoResp {
  UnitVO unit = 1;
  int32 code = 255;
  string msg = 256;
}

// 更新信息
message UnitUpdateInfoReq {
  UnitVO unit = 1;
}

// 关联用户
message UnitLinkUserReq {
  string unitId = 1;
  string userId = 2;
}

// 创建并关联用户
message UnitCreateAndLinkUserReq {
  string unitId = 1;
  int32 codeType = 2;
  repeated core_api.UserVO users = 3;
}
message UnitCreateAndLinkUserResp {
  int32 allCount = 1;
  int32 successCount = 2;
  int32 skipCount = 3;
  int32 code = 255;
  string msg = 256;
}