syntax = "proto3";

package core_api;

option go_package = "./core_api";

import "google/api/annotations.proto";
import "core_api/user.proto";
import "core_api/unit.proto";
import "core_api/config.proto";
import "core_api/dashboard.proto";
import "core_api/conversation.proto";
import "basic/re.proto";

service User {
  rpc UserSignIn(UserSignInReq) returns (UserSignInResp){
    option (google.api.http) = {
      post: "/user/sign_in"
      body: "*"
    };
  }
  rpc UserGetInfo(UserGetInfoReq) returns (UserGetInfoResp){
    option (google.api.http) = {
      get: "/user/get_info"
    };
  }
  rpc UserUpdateInfo(UserUpdateInfoReq) returns (basic.Response){
    option (google.api.http) = {
      post: "/user/update_info"
      body: "*"
    };
  }
  rpc UserUpdatePassword(UserUpdatePasswordReq) returns (basic.Response){
    option (google.api.http) = {
      post: "/user/update_password"
      body: "*"
    };
  }
  rpc CreateUser(CreateUserReq) returns (basic.Response){
    option (google.api.http) = {
      post: "/user/create"
      body: "*"
    };
  }
  rpc SendVerifyCode(SendVerifyCodeReq) returns (basic.Response){
    option (google.api.http) = {
      post: "/user/send_verify_code"
      body: "*"
    };
  }
  rpc SuperAdminSignIn(UserSignInReq) returns (UserSignInResp){
    option (google.api.http) = {
      post: "/user/super_admin_sign_in"
      body: "*"
    };
  }
}

service Unit {
  rpc UnitGetInfo(UnitGetInfoReq) returns (UnitGetInfoResp){
    option (google.api.http) = {
      get: "/unit/get_info"
    };
  }
  rpc UnitUpdateInfo(UnitUpdateInfoReq) returns (basic.Response){
    option (google.api.http) = {
      post: "/unit/update_info"
      body: "*"
    };
  }
  rpc UnitGetByURI(UnitGetByURIReq) returns (UnitGetByURIResp) {
    option (google.api.http) = {
      post: "/unit/get_by_uri"
      body: "*"
    };
  }
  rpc CreateUnit(CreateUnitReq) returns (basic.Response) {
    option (google.api.http) = {
      post: "/unit/create"
      body: "*"
    };
  }
}

service Config {
  rpc ConfigCreate(ConfigCreateOrUpdateReq) returns (basic.Response){
    option (google.api.http) = {
      post: "/config/create"
      body: "*"
    };
  }
  rpc ConfigUpdateInfo(ConfigCreateOrUpdateReq) returns (basic.Response){
    option (google.api.http) = {
      post: "/config/update_info"
      body: "*"
    };
  }
  rpc ConfigGetByUnitID(ConfigGetByUnitIdReq) returns (ConfigGetByUnitIdResp){
    option (google.api.http) = {
      get: "/config/get_by_unit_id"
    };
  }
  rpc ConfigUpdateModelAndBgImage(ConfigUpdateModelAndBgImageReq) returns (basic.Response){
    option (google.api.http) = {
      post: "/config/update_model_and_bg_image"
    };
  }
  rpc ConfigGetModelAndBgImage(ConfigGetModelAndBgImageReq) returns (ConfigGetModelAndBgImageResp){
    option (google.api.http) = {
      get: "/config/get_model_and_bg_image"
    };
  }
}

