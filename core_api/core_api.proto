  }
  rpc DashboardListUsers(DashboardListUsersReq) returns (DashboardListUsersResp) {
    option (google.api.http) = {
      post: "/dashboard/users"
      body: "*"
    };
  }
  rpc DashboardUserConvRecords(DashboardUserConvRecordsReq) returns (DashboardUserConvRecordsResp) {
    option (google.api.http) = {
      post: "/dashboard/user_conversation_records"
      body: "*"
    };
  }
  rpc DashboardUnitConvRecords(DashboardUnitConvRecordsReq) returns (DashboardUnitConvRecordsResp) {
    option (google.api.http) = {
      post: "/dashboard/unit_conversation_records"
      body: "*"
    };
  }
  rpc DashboardGetReport(DashboardGetReportReq) returns (DashboardGetReportResp) {
    option (google.api.http) = {
      post: "/dashboard/get_report"
      body: "*"
    };
  }
  rpc DashboardCreateRemark(DashboardCreateRemarkReq) returns (DashboardCreateRemarkResp) {
    option (google.api.http) = {
      post: "/dashboard/create_remark"
      body: "*"
    };
  }
}

service Conversation {
  rpc CreateConversation (CreateConversationReq) returns (CreateConversationResp) {
    option (google.api.http) = {
      post: "/conversation/create"
      body: "*"
    };
  }
  rpc ListConversations (ListConversationsReq) returns (ListConversationsResp) {
    option (google.api.http) = {
      post: "/conversation/list"
      body: "*"
    };
  }
  rpc GetConversation (GetConversationReq) returns (GetConversationResp) {
    option (google.api.http) = {
      post: "/conversation/get"
      body: "*"
    };
  }
}