    option (google.api.http) = {
      post: "/dashboard/alarm_records"
      body: "*"
    };
  }
  rpc DashboardUpdateAlarm(DashboardUpdateAlarmReq) returns (DashboardUpdateAlarmResp) {
    option (google.api.http) = {
      post: "/dashboard/update_alarm"
      body: "*"
    };
  }
  rpc DashboardListClasses(DashboardListClassesReq) returns (DashboardListClassesResp) {
    option (google.api.http) = {
      post: "/dashboard/classes"
      body: "*"
