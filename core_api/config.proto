syntax = "proto3";

package core_api;

option go_package = "./core_api";

import "basic/pagination.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/any.proto";
import "basic/http.proto";

message ChatApp {
  string name = 1;
  string description = 2;
  string provider = 3;
  string appId = 4;
};

message TTSApp {
  string name = 1;
  string description = 2;
  string provider = 3;
  string appId = 4;
  string speaker = 5;
};

message ReportApp {
  string name = 1;
  string description = 2;
  string provider = 3;
  string appId = 4;
}

message ConfigVO {
  string unitId = 1;
  // 1-2: Chain | End2End
  int32 type = 2;
  ChatApp chat = 3;
  TTSApp tts = 4;
  ReportApp report = 5;
  // 1-2: Active | Deleted
  int32 status = 6;
  int64 createTime = 7;
  int64 updateTime = 8;
  string modelView = 9;
  string backgroundImage = 10;
}

message ConfigCreateOrUpdateReq {
  ConfigVO config = 1;
}

message ConfigGetByUnitIdReq {
  string unitId = 1;
}
message ConfigGetByUnitIdResp {
  ConfigVO config = 1;
  int32 code = 255;
  string msg = 256;
}

message ConfigUpdateModelAndBgImageReq {
  string unitId = 1;
  string modelView = 2;
  string backgroundImage = 3;
}

message ConfigGetModelAndBgImageReq {
  string unitId = 1;
}
message ConfigGetModelAndBgImageResp {
  string modelView = 1;
  string backgroundImage = 2;
  int32 code = 255;
  string msg = 256;
}
