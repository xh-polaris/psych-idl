syntax = "proto3";

package core_api;

option go_package = "./core_api";

import "basic/pagination.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/any.proto";
import "basic/http.proto";
import "core_api/user.proto";

// 数据看板

// 指标总览
message DashboardGetDataOverviewReq {
  optional string unitId = 1;
}
message DashboardGetDataOverviewResp {
  int32 totalUsers = 1;
  int32 weeklyIncreaseUsers = 2;
  double weeklyIncreaseUsersRate = 3;
  optional int32 activeUsers = 4;
  optional int32 weeklyIncreaseActiveUsers = 5;
  optional double weeklyIncreaseActiveUsersRate = 6;
  int32 totalConversations = 7;
  int32 weeklyIncreaseConversations = 8;
  double weeklyIncreaseConversationsRate = 9;
  // minutes
  double averageTimePerConversation = 10;
  // minutes
  double weeklyIncreaseAverageTimePerConversation = 11;
  double weeklyIncreaseAverageTimePerConversationRate = 12;
  int32 alarmUsers = 13;
  int32 weeklyIncreaseAlarmUsers = 14;
  double weeklyIncreaseAlarmUsersRate = 15;
  optional int32 totalUnits = 16;
  optional int32 weeklyIncreaseUnits = 17;
  optional double weeklyIncreaseUnitsRate = 18;
  int32 code = 255;
  string msg = 256;
}

// 学生使用趋势
message DashboardGetDataTrendReq {
  optional string unitId = 1;
}
message DashboardGetDataTrendResp {
  // 近一周学生活跃趋势
  repeated TrendPoint activePoints = 1;
  // 近一周对话频率趋势
  repeated TrendPoint conversationPoints = 2;
  // 对话时间分布
  repeated conversationDuration conversationDurations = 3;
  int32 code = 255;
  string msg = 256;
}
message TrendPoint {
  // 1=Mon ... 7=Sun
  int32 week = 1;
  // 0–23
  int32 hour = 2;
  int32 count = 3;
}
message conversationDuration {
  // RangeKey 代表时间区间索引：
  // 1: 0-5 min
  // 2: 6-10 min
  // 3: 11-20 min
  // 4: 21-30 min
  // 5: 31-60 min
  // 6: 61-120 min
  // 7: 120+ min
  int32 key = 1;

  // Count 该区间内的会话总数
  int32 count = 2;
}

// 管理端-列出单位
message DashboardListUnitsReq {}
message DashboardListUnitsResp {
  repeated DashboardUnit units = 1;
  int32 code = 255;
  string msg = 256;
}
message DashboardUnit {
  string type = 1;
  string name = 2;
  string property = 3;
  int32 userCount = 4;
  double averageConversationMinutes = 5;
  int32 riskUserCount = 6;
  int64 updateTime = 7;
  string id = 8;
}

// 情绪与心理健康趋势
message DashboardGetPsychTrendReq {
  optional string unitId = 1;
}
message DashboardGetPsychTrendResp {
  // 情绪分布
  EmotionRatio emotionRatio = 1;
  // 分性别的风险等级统计
  repeated RiskDistribution risks = 2;
  // 关键词 用于词云
  Keywords keywords = 3;
  int32 code = 255;
  string msg = 256;
}
message RiskDistribution {
  // 1-4: High | Medium | Low | Normal
  int32 level = 1;
  // 0=all 1=male 2=female
  int32 gender = 2;
  int32 count = 3;
}
message Keywords {
  map<string, int32> keywordMap = 1;
  int32 keyTotal = 2;
}
message EmotionRatio {
  // 1-4: Danger | Depress | Negative | Normal
  map<int32, int32> ratio = 1;
  int32 total = 2;
}



// 预警管理
message DashboardGetAlarmOverviewReq {
  string unitId = 1;
}
message DashboardGetAlarmOverviewResp {
  // 当前高风险用户总数
  int32 total = 1;
  // 当前已处理数
  int32 processed = 2;
  // 当前待处理数
  int32 pending = 3;
  // 当前需追踪数
  int32 track = 4;
  // 对比上周总数变化百分比
  double totalChange = 5;
  // 对比上周已处理变化百分比
  double processedChange = 6;
  // 对比上周待处理变化百分比
  double pendingChange = 7;
  // 对比上周需追踪变化百分比
  double trackChange = 8;
  int32 code = 255;
  string msg = 256;
}

message DashboardListAlarmRecordsReq {
  string unitId = 1;
  // 1-4: Danger | Depress | Negative | Normal
  optional int32 emotion = 2;
  // 处理状态 1-2: Processed | Pending
  optional int32 status = 3;
  optional string keyword = 4;
  basic.PaginationOptions paginationOptions = 5;
}
message DashboardListAlarmRecordsResp {
  repeated AlarmRecord records = 1;
  basic.Pagination pagination = 2;
  int32 code = 255;
  string msg = 256;
}

message DashboardUpdateAlarmReq {
  AlarmRecord alarm = 1;
}
message DashboardUpdateAlarmResp {
  int32 code = 255;
  string msg = 256;
}

message AlarmRecord {
  // 唯一Id
  string id = 1;
  // 情绪状态 1-4: Danger | Depress | Negative | Normal
  int32 emotion = 2;
  // 关键词列表
  repeated string keywords = 3;
  // 处理状态 1-2: Processed | Pending
  int32 status = 4;
  // 用户信息
  core_api.UserVO user = 5;
  // 总对话轮数
  int32  totalConversationRounds = 6;
  // 上次对话时间（时间戳）
  int64  lastConversationTime = 7;
}



// 用户管理
message ClassInfo {
  int32 class = 1;
  int32 userNum = 2;
  int32 alarmNum = 3;
  string teacherName = 4;
  string teacherPhone = 5;
}

message GradeInfo {
  int32 grade = 1;
  repeated ClassInfo classes = 2;
}

// 按班年级列出用户
message DashboardListClassesReq {
  string unitId = 1;
  optional int32 grade = 2;
  optional int32 class = 3;
}
message DashboardListClassesResp {
  repeated GradeInfo grades = 1;
  int32 code = 255;
  string msg = 256;
}

message RiskUser {
  core_api.UserVO user = 1;
  // 1-4: High | Medium | Low | Normal
  int32 level = 2;
  // 总对话轮数
  int32  totalConversationRounds = 3;
  // 上次对话时间（分钟时间戳）
  int64  lastConversationTime = 4;
  repeated string keywords = 5;
}

message DashboardListUsersReq{
  string unitId = 1;
  optional int32 grade = 2;
  optional int32 class = 3;
  // 1-4: High | Medium | Low | Normal
  optional int32 level = 4;
  // 0=all 1=male 2=female
  optional int32 gender = 5;
  optional string keyword = 6;
  basic.PaginationOptions paginationOptions = 7;
}
message DashboardListUsersResp {
  repeated RiskUser riskUsers = 1;
  basic.Pagination pagination = 2;
  int32 code = 255;
  string msg = 256;
}


/*对话记录*/

// 获取用户对话记录列表
message DashboardUserConvRecordsReq {
  string userId = 1;
  basic.PaginationOptions paginationOptions = 2;
}
message DashboardUserConvRecordsResp {
  core_api.UserVO user = 1;
  UserConvTrend userConvTrend = 2;
  repeated ConvDetail convDetail = 3;
  basic.Pagination pagination = 4;
  int32 code = 255;
  string msg = 256;
}

message UserConvTrend {
  repeated TrendPoint trendPoints = 1;
}
message ConvDetail {
  // 对话时间
  int64 time = 1;
  // 摘要
  string digest = 2;
  // 关键词（词云）
  Keywords keywords = 3;
}

// 查看报表详情
message DashboardGetReportReq {
  string ConversationId = 1;
}
message DashboardGetReportResp {
  // 对话标题
  string title = 1;
  // 关键词列表
  repeated string keywords = 2;
  // 对话摘要
  string digest = 3;
  // 情绪状态（由模型自由生成） 1-4: Danger | Depress | Negative | Normal
  int32 emotion = 4;
  // 详细分析内容
  string body = 5;
  // 是否需要告警
  bool need_alarm = 6;
  int32 code = 255;
  string msg = 256;
}

// 获取单位下对话记录列表
message DashboardUnitConvRecordsReq {
  optional string unitId = 1;
  basic.PaginationOptions paginationOptions = 2;
}
message DashboardUnitConvRecordsResp {
  repeated ConvOverview conversationList = 1;
  basic.Pagination pagination = 3;
  int32 code = 255;
  string msg = 256;
}

message ConvOverview {
  string convId = 1;
  UserVO user = 2;
  string title = 3;
  int64 time = 4;
  bool needAlarm = 5;
}