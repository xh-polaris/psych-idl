syntax = "proto3";

package core_api;

option go_package = "./core_api";

import "basic/pagination.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/any.proto";
import "basic/http.proto";

message TeacherClassBinding {
  int32 enrollYear = 1;  // 入学年份，用于计算年级
  int32 classNo = 2;     // 班级号
}

message UserVO {
  string id = 1;
  // 1-2: Phone | StudentID
  int32 codeType = 2;
  string code = 3;
  string unitId = 4;
  string name = 5;
  int64 birth = 6;
  // 1-3: Male | Female | Other
  int32 gender = 7;
  // 1-2: Active | Deleted
  int32 status = 8;
  int32 enrollYear = 9;
  int32 grade = 10;
  int32 class = 11;
  Remark remark = 12;
  map<string, google.protobuf.Any> options = 13;
  int64 createTime = 14;
  int64 updateTime = 15;
  int64 deleteTime = 16;
  // 1-5: Student | Teacher | ClassTeacher | UnitAdmin | SuperAdmin
  int32 role = 17;
  // 班主任/教师绑定的班级列表（仅班主任/教师角色有效）
  repeated TeacherClassBinding bindClasses = 18;
}
message Remark {
  int64 time = 1;
  string content = 2;
}


message UserSignInReq {
  // 认证类型
  string authType = 1;
  // 身份凭证（手机号/邮箱/工号）
  string authId = 2;
  // 密码/验证码
  string verifyCode = 3;
  // 单位id 单位管理传入对应id；超管登录时该字段传空值
  string unitId = 4;
}

message UserSignInResp {
  string unitId = 1;
  string userId = 2;
  string token = 3;
  // 学生学号
  string codeValue = 4;
  int32 code = 255;
  string msg = 256;
}

// 更新信息
message UserUpdateInfoReq {
  // 新的psychUser相关信息，不包括userId、密码等基础账号信息
  UserVO user = 1;
}

// 更新密码
message UserUpdatePasswordReq {
  string userId = 1;
  string unitId = 2;
  string authType = 3;
  string authId = 4;
  string verifyCode = 5;
  string newPassword = 6;
}

// 获取信息
message UserGetInfoReq {
  string userId = 1;
}
message UserGetInfoResp {
  UserVO user = 1;
  int32 code = 255;
  string msg = 256;
}

// 创建用户 email/phone/code至少传入一个
message CreateUserReq {
  string unitId = 1;
  // 明文密码
  string password = 2;
  optional string email = 3;
  optional string phone = 4;
  optional string code = 5;
  int32 codeType = 6;
  string name = 7;
  int64 birth = 8;
  int32 gender = 9;
  // 入学年份，用于计算年级
  int32 enrollYear = 10;
  // 年级 enrollYear非空时以enrollYear为准计算年级
  int32 grade = 11;
  int32 class = 12;
  int32 role = 13;
  int32 status = 14;
  int64 createTime = 15;
  int64 updateTime = 16;
  int64 deleteTime = 17;
}
message CreateUserResp {
  UserVO user = 1;
  int32 code = 255;
  string msg = 256;
}


message SendVerifyCodeReq {
  // 认证类型 "email" | "phone"
  string authType = 1;
  // 邮箱地址 | 手机号
  string authId = 2;
}
