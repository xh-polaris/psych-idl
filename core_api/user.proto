syntax = "proto3";

package core_api;

option go_package = "core_api";

import "basic/pagination.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/any.proto";
import "basic/http.proto";

message User {
  string id = 1;
  string codeType = 2;
  string code = 3;
  string password = 4;
  string unitId = 5;
  string name = 6;
  int64 birth = 7;
  string gender = 8;
  string status = 9;
  int32 enrollYear = 10;
  int32 grade = 11;
  int32 class = 12;
  Remark remark = 13;
  map<string, google.protobuf.Any> options = 14;
  int64 createTime = 15;
  int64 updateTime = 16;
  int64 deleteTime = 17;
  int32 role = 18;
}
message Remark {
  int64 time = 1;
  string content = 2;
}


// 注册相关
message UserSignUpReq {
  User user = 1;
}
message UserSignUpResp {
  User user = 1;
  int32 code = 255;
  string msg = 256;
}

message UserSignInReq {
  int32 authType = 1;
  string authId = 2;
  string verifyCode = 3;
  string unitId = 4;
}
message UserSignInResp {
  string unitId = 1;
  string userId = 2;
  string codeType = 3;
  string codeValue = 4;
  string token = 5;
  int32 code = 255;
  string msg = 256;
}

// 更新信息
message UserUpdateInfoReq {
  User user = 1;
}

// 更新密码
message UserUpdatePasswordReq {
  string id = 1;
  int32 authType = 2;
  string verifyCode = 3;
  string newPassword = 4;
}

// 获取信息
message UserGetInfoReq {
  string userId = 1;
}
message UserGetInfoResp {
  core_api.User user = 1;
  int32 code = 255;
  string msg = 256;
}