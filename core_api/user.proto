syntax = "proto3";

package core_api;

option go_package = "./core_api";

import "basic/pagination.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/any.proto";
import "basic/http.proto";

message UserVO {
  string id = 1;
  // 1-2: Phone | StudentID
  int32 codeType = 2;
  string code = 3;
  string password = 4;
  string unitId = 5;
  string name = 6;
  int64 birth = 7;
  // 1-3: Male | Female | Other
  int32 gender = 8;
  // 1-2: Active | Deleted
  int32 status = 9;
  int32 enrollYear = 10;
  int32 grade = 11;
  int32 class = 12;
  Remark remark = 13;
  map<string, google.protobuf.Any> options = 14;
  int64 createTime = 15;
  int64 updateTime = 16;
  int64 deleteTime = 17;
  // 1-5: Student | Teacher | ClassTeacher | UnitAdmin | SuperAdmin
  int32 role = 18;
}
message Remark {
  int64 time = 1;
  string content = 2;
}


message UserSignInReq {
  // 1-2: Password | VerifyCode
  int32 authType = 1;
  string authId = 2;
  string verifyCode = 3;
  string unitId = 4;
}

message StudentSignInReq {
  int32 authType = 1;     // 1: Password, 2: VerifyCode
  string code = 2;        // Student ID or Phone
  string verifyCode = 3;
  string unitId = 4;      // Required
}

message AdminSignInReq {
  int32 authType = 1;
  string account = 2;     // Phone or Staff ID
  string verifyCode = 3;
  string unitId = 4;      // Optional
}

message UserSignInResp {
  string unitId = 1;
  string userId = 2;
  int32 codeType = 3;
  string codeValue = 4;
  string token = 5;
  int32 code = 255;
  string msg = 256;
}

// 更新信息
message UserUpdateInfoReq {
  UserVO user = 1;
}

// 更新密码
message UserUpdatePasswordReq {
  string id = 1;
  // 1-2: Password | VerifyCode
  int32 authType = 2;
  string verifyCode = 3;
  string newPassword = 4;
}

// 获取信息
message UserGetInfoReq {
  string userId = 1;
}
message UserGetInfoResp {
  UserVO user = 1;
  int32 code = 255;
  string msg = 256;
}