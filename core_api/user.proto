syntax = "proto3";

package core_api;

option go_package = "./core_api";

import "basic/pagination.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/any.proto";
import "basic/http.proto";

message UserVO {
  string id = 1;
  // 1-2: Phone | StudentID
  int32 codeType = 2;
  string code = 3;
  string password = 4;
  string unitId = 5;
  string name = 6;
  int64 birth = 7;
  // 1-3: Male | Female | Other
  int32 gender = 8;
  // 1-2: Active | Deleted
  int32 status = 9;
  int32 enrollYear = 10;
  int32 grade = 11;
  int32 class = 12;
  Remark remark = 13;
  map<string, google.protobuf.Any> options = 14;
  int64 createTime = 15;
  int64 updateTime = 16;
  int64 deleteTime = 17;
  // 1-5: Student | Teacher | ClassTeacher | UnitAdmin | SuperAdmin
  int32 role = 18;
}
message Remark {
  int64 time = 1;
  string content = 2;
}


message UserSignInReq {
  // 1-2: Password | VerifyCode
  int32 authType = 1;
  string authId = 2;
  string verifyCode = 3;
  string unitId = 4;
}

message StudentSignInReq {
  // 认证类型 学生登录通常为"code-password"
  string authType = 1;
  // 身份凭证 学生登录通常为学号
  string authId = 2;
  // 密码/验证码 学生登陆通常为密码
  string verify = 3;
  // 单位id-必需 通常填入由uri获取到的unitId
  string unitId = 4;
}

message AdminSignInReq {
  // 认证类型
  string authType = 1;
  // 身份凭证（手机号/邮箱/工号）
  string authId = 2;
  // 密码/验证码
  string verifyCode = 3;
  // 单位id 单位管理传入对应id；超管该字段留空
  optional string unitId = 4;
}

message UserSignInResp {
  optional string unitId = 1;
  string userId = 2;
  string codeType = 3;
  string codeValue = 4;
  string token = 5;
  int32 code = 255;
  string msg = 256;
}

// 更新信息
message UserUpdateInfoReq {
  // 新的psychUser相关信息，不包括userId、密码等基础账号信息
  UserVO user = 1;
}

// 更新密码
message UserUpdatePasswordReq {
  string authType = 1;
  string verify = 2;
  string newPassword = 3;
}

// 获取信息
message UserGetInfoReq {
  string userId = 1;
}
message UserGetInfoResp {
  UserVO user = 1;
  int32 code = 255;
  string msg = 256;
}

message CreateUserReq {
  // 无需UserVO中的全量参数，如remark参数可留空
  UserVO user = 1;
}
