name: Generate Golang Code By Kitex

on:
  push:
    branches: [ "idl" ]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      # 1. 检出 main 分支 (代码存放处，包含 build.sh)
      - name: Checkout main branch
        uses: actions/checkout@v3
        with:
          ref: main
          path: .

      # 2. 检出 idl 分支 (接口定义处)
      - name: Checkout IDL branch
        uses: actions/checkout@v3
        with:
          ref: idl
          path: ./idl

      # 3. 配置 Go 环境
      - name: Setup Golang
        uses: actions/setup-go@v4
        with:
          go-version: "1.22"

      # 4. 安装必备工具 (恢复了 goctl 以自动安装 protoc)
      - name: Install Tools
        run: |
          go install github.com/zeromicro/go-zero/tools/goctl@latest
          go install github.com/cloudwego/kitex/tool/cmd/kitex@latest
          go install github.com/google/gnostic/cmd/protoc-gen-openapi@latest
          # 这一步非常重要，它会帮你把 protoc 安装到 /home/runner/go/bin 目录下
          goctl env check --install --verbose --force
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      # 5. 执行生成任务
      - name: Update and Generate
        run: |
          # 清理旧产物
          rm -rf kitex_gen
          rm -rf doc
          mkdir -p doc
          
          # 补全官方 Google API 依赖
          mkdir -p ./idl/google/api
          curl -sSL https://raw.githubusercontent.com/googleapis/googleapis/master/google/api/annotations.proto -o ./idl/google/api/annotations.proto
          curl -sSL https://raw.githubusercontent.com/googleapis/googleapis/master/google/api/http.proto -o ./idl/google/api/http.proto
          
          # 第一步：生成 OpenAPI (Swagger) 文档
          ALL_PROTO_FILES=$(find ./idl -name "*.proto" -not -path "./idl/google/*")
          echo "正在生成 OpenAPI 文档..."
          # 这里明确使用 goctl 安装的 protoc 路径，防止由于环境变量未生效导致找不到命令
          /home/runner/go/bin/protoc --proto_path=./idl \
              --openapi_out=version=3.0.0,naming=json:./doc \
              $ALL_PROTO_FILES
          
          # 第二步：修正 go_package 路径 (解决 Kitex Panic)
          MODULE_PATH="github.com/xh-polaris/psych-idl/kitex_gen"
          echo "正在修正路径映射以适配 Kitex..."
          for file in $(find ./idl -name "*.proto"); do
            REL_DIR=$(dirname "$file" | sed 's|./idl/||; s|./idl||')
            if [ -z "$REL_DIR" ] || [ "$REL_DIR" = "." ]; then
              FINAL_PACKAGE="$MODULE_PATH"
            else
              FINAL_PACKAGE="$MODULE_PATH/$REL_DIR"
            fi
            sed -i "s|option go_package = \"[^\"]*\";|option go_package = \"$FINAL_PACKAGE\";|g" "$file"
          done
          
          # 第三步：执行 Kitex 构建
          export IDL_DIR=./idl
          chmod 755 /home/runner/go/bin/protoc
          chmod +x build.sh
          sh build.sh

      # 6. 提交到 main 分支
      - name: Commit And Push
        run: |
          git config --global user.email "bot@xhpolaris.com"
          git config --global user.name "${{ github.actor }}"
          
          git add kitex_gen doc
          
          if git diff --staged --quiet; then
            echo "没有检测到任何变更，跳过提交。"
          else
            git commit -m "Auto-gen code and swagger: ${{ github.event.head_commit.message }}"
            git push origin main
          fi